spring.application.name=shieldher
spring.datasource.url=jdbc:mysql://localhost:3306/shieldher
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=5098
spring.security.enabled=false
# OkHttp timeout
server.tomcat.connection-timeout=60000
# Google Vision
google.vision.api.key=${GOOGLE_VISION_KEY}

# SerpAPI
serp.api.key=${SERP_API_KEY}

# Cloudinary
cloudinary.cloud.name=${CLOUDINARY_NAME}
cloudinary.api.key=${CLOUDINARY_KEY}
cloudinary.api.secret=${CLOUDINARY_SECRET}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload size limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

sightengine.api.user= ${AI_KEY_USER}
sightengine.api.secret =${AI_SECRET}
