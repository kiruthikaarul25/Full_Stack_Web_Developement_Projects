<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldHer — Protect Your Photos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #764ba2;
            font-size: 28px;
        }
        .logo p {
            color: #888;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            border: none;
            font-size: 15px;
            transition: all 0.3s;
        }
        .tab.active {
            background: #764ba2;
            color: white;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus {
            border-color: #764ba2;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🛡️ ShieldHer</h1>
            <p>Protect your photos online</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Your Email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder=" Your Password">
            </div>
            <button class="btn" onclick="login()">Login</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="regName" >
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" >
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="regPhone">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword">
            </div>
            <button class="btn" onclick="register()">Register</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const API = 'http://localhost:5098/api';

        function showTab(tab) {
            document.getElementById('loginForm').style.display = 
                tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = 
                tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', 
                    (tab === 'login' && i === 0) || 
                    (tab === 'register' && i === 1));
            });
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('userName', data.name);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    showMessage('Invalid email or password!', 'error');
                }
            } catch (e) {
                showMessage('Server error! Try again.', 'error');
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, phone, password})
                });
                if (res.ok) {
                    showMessage('Registered! Please login.', 'success');
                    setTimeout(() => showTab('login'), 1500);
                } else {
                    showMessage('Registration failed!', 'error');
                }
            } catch (e) {
                showMessage('Server error! Try again.', 'error');
            }
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
        }
    </script>
</body>
</html>
