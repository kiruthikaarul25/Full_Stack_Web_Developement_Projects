<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wishlist – SportZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/like.css}" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/1f3c6.png">
  </head>
<body>

<!-- HEADER -->
<header class="header">
  <button class="menu-btn" onclick="window.location.href='/main'">←</button>
  <div class="logo">Sport<span class="logo-white">Zone</span></div>
  <div class="hd-right">
    <button class="icon-btn" onclick="window.location.href='/cart'">
      🛒<span class="cart-badge" id="cartCount">0</span>
    </button>
    <div class="profile-pill">
      <div class="avatar" th:text="${user.firstName.substring(0,1)}">U</div>
      <div class="profile-info">
        <div class="pname" th:text="${user.firstName}">User</div>
        <div class="prole">Member</div>
      </div>
    </div>
  </div>
</header>

<div class="wish-page">
  <a class="back-btn" href="/main">← Back to Shopping</a>
  <div class="wish-title">My <span>Wishlist</span> ❤️</div>

  <div id="wishItems"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
<script th:src="@{/js/like.js}"></script>
</body>
</html>
